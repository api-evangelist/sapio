apis:
  - aid: sapio:sapio-rest-api
    name: Sapio REST API
    description: >-
      The Sapio REST API provides programmatic access to the Sapio Informatics
      Platform, enabling developers to query and create records, manage laboratory
      workflows, handle experimental data, configure data types, manage users and
      picklists, and implement webhook-based automation. The official Python client
      sapiopylib exposes the full API surface including batch request support for
      performance-optimized lab data operations.
