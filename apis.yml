aid: sapio
name: Sapio Sciences
description: >-
  Sapio Sciences provides an AI-native lab informatics platform that unifies
  LIMS, ELN, and Scientific Data Cloud capabilities for life sciences research.
  The platform exposes a RESTful API enabling programmatic access to laboratory
  workflows, experimental data, LIMS processes, sample management, and
  instrument integrations. The official Python client library sapiopylib wraps
  all REST API functions, supporting data record manipulation, picklist services,
  notebook experiments, webhook servers, and batch request processing for
  high-performance lab automation.
